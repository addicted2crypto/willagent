<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WillAgent Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #00ff00;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #00ff00;
      font-size: 16px;
      font-weight: normal;
    }

    .header .status {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: #666;
    }

    .header .status .model {
      color: #ffcc00;
    }

    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #0a0a0a;
    }

    .entry {
      margin-bottom: 20px;
      border-left: 2px solid #333;
      padding-left: 15px;
    }

    .entry.user {
      border-color: #0088ff;
    }

    .entry.agent {
      border-color: #00ff00;
    }

    .entry.error {
      border-color: #ff4444;
    }

    .entry-header {
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }

    .entry-header .label {
      color: #888;
    }

    .entry-header .user-label {
      color: #0088ff;
    }

    .entry-header .agent-label {
      color: #00ff00;
    }

    .entry-content {
      color: #ccc;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Wallet address styling */
    .wallet-addr {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #00ccff;
      text-decoration: none;
      transition: all 0.2s;
    }

    .wallet-addr .addr-text {
      border-bottom: 1px dotted #00ccff;
    }

    .wallet-addr:hover .addr-text {
      color: #00ffff;
      border-bottom-style: solid;
    }

    .wallet-addr .full {
      display: none;
    }

    .wallet-addr.revealed .short {
      display: none;
    }

    .wallet-addr.revealed .full {
      display: inline;
    }

    .wallet-addr .addr-links {
      display: inline-flex;
      gap: 2px;
      font-size: 9px;
    }

    .wallet-addr .addr-links a {
      color: #555;
      text-decoration: none;
      padding: 1px 4px;
      border-radius: 2px;
      background: #1a1a1a;
      transition: all 0.15s;
    }

    .wallet-addr .addr-links a:hover {
      color: #fff;
      background: #333;
    }

    .wallet-addr .addr-links a.debank:hover { background: #fe815f20; color: #fe815f; }
    .wallet-addr .addr-links a.snowtrace:hover { background: #e8414120; color: #e84141; }

    .wallet-addr .reveal-btn {
      font-size: 9px;
      color: #444;
      cursor: pointer;
      padding: 1px 3px;
      border-radius: 2px;
      background: #1a1a1a;
    }

    .wallet-addr .reveal-btn:hover {
      color: #00ff00;
      background: #1a2a1a;
    }

    .wallet-addr.revealed .reveal-btn {
      color: #666;
    }

    /* Privacy mode - blur addresses for screenshots */
    body.privacy-mode .wallet-addr {
      filter: blur(4px);
      user-select: none;
    }

    body.privacy-mode .wallet-addr:hover {
      filter: blur(0);
    }

    .privacy-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
      transition: all 0.2s;
    }

    .privacy-toggle:hover {
      background: #222;
      color: #888;
    }

    .privacy-toggle.active {
      background: #331a1a;
      color: #ff6666;
    }

    .entry.user .entry-content {
      color: #fff;
    }

    .step {
      margin: 10px 0;
      padding: 10px;
      background: #111;
      border-radius: 4px;
    }

    .step-header {
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }

    .step-type {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      margin-right: 8px;
    }

    .step-type.thought { background: #333; color: #aaa; }
    .step-type.action { background: #1a3a1a; color: #00ff00; }
    .step-type.observation { background: #1a1a3a; color: #88aaff; }
    .step-type.answer { background: #3a3a1a; color: #ffcc00; }

    .meta {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
      font-size: 11px;
      color: #555;
      display: flex;
      gap: 20px;
    }

    .meta span {
      color: #666;
    }

    .input-area {
      background: #1a1a1a;
      border-top: 1px solid #333;
      padding: 15px 20px;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px 15px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    .input-area input:focus {
      border-color: #00ff00;
    }

    .input-area input::placeholder {
      color: #444;
    }

    .input-area button {
      background: #00aa00;
      border: none;
      border-radius: 4px;
      padding: 12px 25px;
      color: #000;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #00cc00;
    }

    .input-area button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .loading {
      display: inline-block;
      color: #ffcc00;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Progress Panel (Thinking...) */
    .progress-panel {
      background: #1a1a2a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 15px;
      margin: 10px 0;
      display: none;
    }

    .progress-panel.active {
      display: block;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-title {
      color: #ffcc00;
      font-weight: bold;
      font-size: 12px;
    }

    .progress-percent {
      color: #00ff00;
      font-size: 12px;
    }

    .progress-bar {
      background: #222;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #00aa00, #00ff00);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-steps {
      font-size: 11px;
      color: #888;
    }

    .progress-step {
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-step::before {
      content: '├──';
      color: #444;
    }

    .progress-step:last-child::before {
      content: '└──';
    }

    .progress-step.current {
      color: #00ff00;
    }

    .progress-step.done {
      color: #666;
    }

    /* Retry button for errors */
    .retry-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 12px;
      background: #332222;
      border: 1px solid #ff4444;
      border-radius: 4px;
      color: #ff6666;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .retry-btn:hover {
      background: #442222;
      color: #ff8888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>> WillAgent Terminal v0.1</h1>
    <div class="status">
      <div class="privacy-toggle" id="privacyToggle" onclick="togglePrivacy()" title="Blur addresses for screenshots">
        <span>[PRIVACY]</span>
      </div>
      <span>Model: <span class="model" id="currentModel">--</span></span>
      <span>Status: <span id="statusIndicator">Ready</span></span>
    </div>
  </div>

  <div class="terminal" id="terminal">
    <div class="entry agent">
      <div class="entry-header">
        <span class="agent-label">SYSTEM</span> initialized
      </div>
      <div class="entry-content">WillAgent ready. Routes: VL 30B (simple) | GPT120B (complex) | Claude (critical)
Type a query below to test the agent.</div>
    </div>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="queryInput"
      placeholder="Enter your query..."
      autocomplete="off"
    />
    <button id="submitBtn" onclick="submitQuery()">Execute</button>
  </div>

  <script>
    const terminal = document.getElementById('terminal');
    const queryInput = document.getElementById('queryInput');
    const submitBtn = document.getElementById('submitBtn');
    const currentModel = document.getElementById('currentModel');
    const statusIndicator = document.getElementById('statusIndicator');

    // Track progress panel and SSE connection
    let progressPanel = null;
    let progressSteps = [];
    let eventSource = null;
    let lastQuery = null; // For retry functionality

    // Submit on Enter
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !submitBtn.disabled) {
        submitQuery();
      }
    });

    async function submitQuery() {
      const query = queryInput.value.trim();
      if (!query) return;

      // Disable input
      submitBtn.disabled = true;
      queryInput.disabled = true;
      statusIndicator.innerHTML = '<span class="loading">Processing</span>';

      // Save for retry
      lastQuery = query;

      // Add user entry
      addEntry('user', query);
      queryInput.value = '';

      // Create progress panel
      progressPanel = createProgressPanel();
      progressSteps = [];

      // Subscribe to all progress events (we'll filter client-side)
      subscribeToProgress();

      try {
        const startTime = Date.now();
        const response = await fetch('/api/v1/agent/task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: query })
        });

        const data = await response.json();
        const elapsed = Date.now() - startTime;

        // Close SSE connection
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }

        // Remove progress panel
        if (progressPanel) {
          progressPanel.remove();
          progressPanel = null;
        }

        // Update model indicator
        currentModel.textContent = data.model || '--';

        // Add response
        addAgentResponse(data, elapsed);

      } catch (error) {
        if (progressPanel) {
          progressPanel.remove();
          progressPanel = null;
        }
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        addErrorWithRetry(error.message, lastQuery);
      }

      // Re-enable input
      submitBtn.disabled = false;
      queryInput.disabled = false;
      queryInput.focus();
      statusIndicator.textContent = 'Ready';
    }

    function createProgressPanel() {
      const panel = document.createElement('div');
      panel.className = 'progress-panel active';
      panel.innerHTML = `
        <div class="progress-header">
          <span class="progress-title">THINKING...</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div class="progress-steps" id="progressSteps">
          <div class="progress-step current">Initializing...</div>
        </div>
      `;
      terminal.appendChild(panel);
      terminal.scrollTop = terminal.scrollHeight;
      return panel;
    }

    function updateProgress(data) {
      if (!progressPanel) return;

      const percentEl = document.getElementById('progressPercent');
      const barFill = document.getElementById('progressBarFill');
      const stepsEl = document.getElementById('progressSteps');

      if (percentEl && data.progress !== undefined) {
        percentEl.textContent = `${data.progress}%`;
      }
      if (barFill && data.progress !== undefined) {
        barFill.style.width = `${data.progress}%`;
      }
      if (stepsEl && data.message) {
        // Add new step
        progressSteps.push(data.message);
        // Keep last 5 steps
        const recentSteps = progressSteps.slice(-5);
        stepsEl.innerHTML = recentSteps.map((msg, i) => {
          const isCurrent = i === recentSteps.length - 1;
          return `<div class="progress-step ${isCurrent ? 'current' : 'done'}">${escapeHtml(msg)}</div>`;
        }).join('');
      }

      terminal.scrollTop = terminal.scrollHeight;
    }

    function subscribeToProgress() {
      // Subscribe to all progress events stream
      eventSource = new EventSource('/api/v1/agent/progress/all');

      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          updateProgress(data);
        } catch (e) {
          console.error('Failed to parse progress event:', e);
        }
      };

      eventSource.onerror = (error) => {
        console.log('SSE connection closed or error');
        // Don't remove panel on error - task might still be running
      };
    }

    function addErrorWithRetry(errorMsg, query) {
      const entry = document.createElement('div');
      entry.className = 'entry error';
      const time = new Date().toLocaleTimeString();

      entry.innerHTML = `
        <div class="entry-header">
          <span class="error-label">ERROR</span> ${time}
        </div>
        <div class="entry-content">
          Error: ${escapeHtml(errorMsg)}
          <button class="retry-btn" onclick="retryQuery('${escapeHtml(query).replace(/'/g, "\\'")}')">Retry</button>
        </div>
      `;

      terminal.appendChild(entry);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function retryQuery(query) {
      queryInput.value = query;
      submitQuery();
    }

    function addEntry(type, content, isHtml = false) {
      const entry = document.createElement('div');
      entry.className = `entry ${type}`;

      const time = new Date().toLocaleTimeString();
      const label = type === 'user' ? 'USER' : type === 'error' ? 'ERROR' : 'AGENT';
      const labelClass = type === 'user' ? 'user-label' : type === 'error' ? 'error-label' : 'agent-label';

      entry.innerHTML = `
        <div class="entry-header">
          <span class="${labelClass}">${label}</span> ${time}
        </div>
        <div class="entry-content">${isHtml ? content : escapeHtml(content)}</div>
      `;

      terminal.appendChild(entry);
      terminal.scrollTop = terminal.scrollHeight;
      return entry;
    }

    function addAgentResponse(data, elapsed) {
      const entry = document.createElement('div');
      entry.className = 'entry agent';

      const time = new Date().toLocaleTimeString();

      // Build steps HTML
      let stepsHtml = '';
      if (data.steps && data.steps > 0) {
        stepsHtml = `<div class="step">
          <div class="step-header"><span class="step-type thought">THOUGHT</span> ReACT loop executed ${data.steps} step(s)</div>
        </div>`;
      }

      // Complexity badge color
      const complexityColors = {
        low: '#00aa00',
        medium: '#ffaa00',
        high: '#ff6600',
        critical: '#ff0000'
      };
      const complexityColor = complexityColors[data.complexity] || '#888';

      entry.innerHTML = `
        <div class="entry-header">
          <span class="agent-label">AGENT</span> ${time}
        </div>
        ${stepsHtml}
        <div class="step">
          <div class="step-header"><span class="step-type answer">ANSWER</span></div>
          <div class="entry-content">${processAddresses(data.answer || data.error || 'No response')}</div>
        </div>
        <div class="meta">
          <span>Complexity: <span style="color: ${complexityColor}">${data.complexity || '--'}</span></span>
          <span>Model: ${data.model || '--'}</span>
          <span>Time: ${elapsed}ms</span>
          <span>Status: ${data.status || '--'}</span>
        </div>
      `;

      terminal.appendChild(entry);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Process text to convert addresses to clickable links
    function processAddresses(text) {
      // First escape HTML
      let escaped = escapeHtml(text);

      // Match full Ethereum addresses (0x + 40 hex chars)
      const fullAddrRegex = /0x[a-fA-F0-9]{40}/g;

      // Match shortened addresses (0x1234...abcd pattern)
      const shortAddrRegex = /0x[a-fA-F0-9]{4,10}\.\.\.+[a-fA-F0-9]{4,6}/g;

      // Replace full addresses with clickable links + explorer buttons
      escaped = escaped.replace(fullAddrRegex, (addr) => {
        const short = `${addr.slice(0, 10)}...${addr.slice(-6)}`;
        return `<span class="wallet-addr">` +
               `<span class="addr-text"><span class="short">${short}</span><span class="full">${addr}</span></span>` +
               `<span class="addr-links">` +
               `<a href="https://debank.com/profile/${addr}" target="_blank" class="debank" title="DeBank Profile">DB</a>` +
               `<a href="https://snowtrace.io/address/${addr}" target="_blank" class="snowtrace" title="Snowtrace">ST</a>` +
               `</span>` +
               `<span class="reveal-btn" onclick="this.parentElement.classList.toggle('revealed')" title="Show full address">[+]</span>` +
               `</span>`;
      });

      // Replace shortened addresses (style only - can't link without full address)
      escaped = escaped.replace(shortAddrRegex, (addr) => {
        return `<span class="wallet-addr" style="cursor: default;">` +
               `<span class="addr-text" style="border-bottom-style: dashed;" title="Shortened address (full not available)">${addr}</span>` +
               `</span>`;
      });

      return escaped;
    }

    // Toggle privacy mode for screenshots
    function togglePrivacy() {
      const body = document.body;
      const toggle = document.getElementById('privacyToggle');
      body.classList.toggle('privacy-mode');
      toggle.classList.toggle('active');
    }

    // Focus input on load
    queryInput.focus();
  </script>
</body>
</html>
